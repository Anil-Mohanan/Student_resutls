{% load static %}
<!DOCTYPE html>
<html>

<head>
       <title>Add Student</title>
       <link rel="stylesheet" href="{% static 'results/style.css' %}">
</head>

<body>
       <div class="topbar">
              <h2>Add Student</h2>
              <a href="{% url 'manage_students' %}">← Back</a>
       </div>
       {% if error %}
       <p class="error">{{ error }}</p>
       {% endif %}
       <form method="POST">
              {% csrf_token %}
              <input type="text" name="name" placeholder="Full Name" required><br><br>
              <input type="text" name="roll_number" placeholder="Roll Number" required><br><br>
              <input type="text" name="class_name" placeholder="Class" required><br><br>
              <button type="submit">Add Student</button>
       </form>
</body>

</html>
