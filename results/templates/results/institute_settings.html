{% load static %}
<!DOCTYPE html>
<html>

<head>
       <title>Institute Settings</title>
       <link rel="stylesheet" href="{% static 'results/style.css' %}">
</head>

<body>
       <div class="topbar">
              <h2>Institute Settings</h2>
              <a href="{% url 'dashboard' %}">← Dashboard</a>
       </div>

       <div class="login-box">
              {% if success %}
              <p style="color:green; font-weight:bold">{{ success }}</p>
              {% endif %}
              {% if error %}
              <p class="error">{{ error }}</p>
              {% endif %}
              <form method="POST">
                     {% csrf_token %}
                     <input type="text" name="institute_name" placeholder="Institute Name"
                            value="{{ settings.institute_name|default:'' }}" required><br><br>
                     <input type="text" name="institute_initials" placeholder="Initials (e.g. KL, BF)"
                            value="{{ settings.institute_initials|default:'' }}" maxlength="10" required><br><br>
                     <button type="submit">Save Settings</button>
              </form>
       </div>
</body>

</html>
